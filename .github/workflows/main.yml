name: Build Android Scene (Unsigned)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # 允許手動點擊按鈕執行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 檢出代碼
        uses: actions/checkout@v4

      - name: 設置 Java 環境 (JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 授權執行權限給 Gradle
        run: chmod +x ./gradlew

      - name: 執行 Gradle 構建 (Assemble Debug)
        run: ./gradlew assembleDebug --stacktrace

      - name: 整理並上傳構建產物
        uses: actions/upload-artifact@v4
        with:
          name: Scene-Build-APKs
          # 萬用路徑：掃描所有子目錄下的 apk 檔案，解決路徑不匹配問題
          path: "**/build/outputs/apk/**/*.apk"
          # 如果檔案不存在，讓 Action 報錯提醒
          if-no-files-found: error
