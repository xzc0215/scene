name: Build Android Scene (Unsigned)

on:
  push:
    branches: [ "main", "master" ] # 當推送到主分支時觸發
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # 允許手動觸發構建

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 檢出代碼
        uses: actions/checkout@v4

      - name: 設置 Java 環境 (JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 授權執行權限給 Gradle
        run: chmod +x ./gradlew

      - name: 執行 Gradle 構建 (Assemble Debug)
        run: ./gradlew assembleDebug

      - name: 整理並上傳構建產物
        uses: actions/upload-artifact@v4
        with:
          name: Scene-Unsigned-APK
          path: app/build/outputs/apk/debug/*.apk
